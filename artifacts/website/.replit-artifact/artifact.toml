kind = "web"
previewPath = "/"
title = "Website"
version = "1.0.0"
id = "artifacts/website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19161

[services.development]
run = "pnpm --filter @workspace/website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/website", "run", "build" ]
publicDir = "artifacts/website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19161"
BASE_PATH = "/"
